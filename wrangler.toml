name = "bible-chapel-planner"
pages_build_output_dir = "dist"
compatibility_date = "2026-06-17"

# Create the production database with:
#   npx wrangler d1 create bible-chapel-ministry-os
# Then replace database_id below with the generated UUID.
[[d1_databases]]
binding = "DB"
database_name = "bible-chapel-ministry-os"
database_id = "replace-with-cloudflare-d1-database-id"
migrations_dir = "cloudflare/migrations"
